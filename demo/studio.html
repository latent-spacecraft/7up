<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7UP Studio — Level Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1a1a2a;
  }
  header h1 {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd43b);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }
  .header-actions { display: flex; gap: 8px; }

  main { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 300px; min-width: 300px;
    border-right: 1px solid #1a1a2a;
    overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .section {
    border: 1px solid #1a1a2a;
    border-radius: 6px;
    overflow: hidden;
  }
  .section-head {
    background: #12121a;
    padding: 8px 12px;
    font-size: 10px; font-weight: 700;
    color: #666; text-transform: uppercase; letter-spacing: 2px;
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-head:hover { color: #999; }
  .section-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .section.collapsed .section-body { display: none; }

  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label {
    font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px;
    display: flex; justify-content: space-between;
  }
  .field label .val { color: #9775fa; }

  input[type="text"], input[type="number"], textarea, select {
    background: #14141f; border: 1px solid #2a2a3a; border-radius: 3px;
    color: #e0e0e0; font-family: inherit; font-size: 11px;
    padding: 6px 8px; outline: none; width: 100%;
  }
  input:focus, textarea:focus { border-color: #ffa94d; }
  textarea { resize: vertical; min-height: 50px; font-size: 10px; line-height: 1.4; }

  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 3px;
    background: #2a2a3a; border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    background: #ffa94d; border-radius: 50%; cursor: pointer;
  }

  .row { display: flex; gap: 8px; }
  .row > .field { flex: 1; }

  /* Buttons */
  button {
    font-family: inherit; font-size: 11px; font-weight: 700;
    padding: 7px 14px; border: none; border-radius: 3px;
    cursor: pointer; letter-spacing: 1px;
  }
  .btn-primary { background: linear-gradient(135deg, #ff6b6b, #ffa94d); color: #0a0a0f; }
  .btn-secondary { background: #1a1a2a; color: #888; border: 1px solid #2a2a3a; }
  .btn-small { padding: 4px 10px; font-size: 10px; }
  .btn-danger { background: #3a1a1a; color: #ff6b6b; border: 1px solid #4a2a2a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:hover:not(:disabled) { filter: brightness(1.1); }

  /* Preview grid */
  .preview-area {
    flex: 1; padding: 16px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .preview-card {
    background: #12121a;
    border: 1px solid #1a1a2a;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .preview-card:hover { border-color: #ffa94d; }
  .preview-card .thumb {
    width: 100%; aspect-ratio: 1;
    background: #0a0a0f;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .preview-card .thumb img {
    max-width: 100%; max-height: 100%; object-fit: contain;
  }
  .preview-card .thumb .placeholder {
    color: #333; font-size: 10px; text-align: center;
  }
  .preview-card .thumb .spinner {
    width: 20px; height: 20px;
    border: 2px solid #333; border-top-color: #ffa94d;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .preview-card .info {
    padding: 8px 10px; font-size: 9px; color: #666;
    border-top: 1px solid #1a1a2a;
    display: flex; justify-content: space-between;
  }
  .preview-card .info .name { color: #aaa; font-weight: 700; }

  /* Sprite row */
  .sprite-row {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0;
  }
  .sprite-row img {
    height: 64px; border-radius: 3px;
    background: repeating-conic-gradient(#1a1a2a 0% 25%, #14141f 0% 50%) 50%/8px 8px;
  }

  /* Status bar */
  .status-bar {
    padding: 6px 20px;
    border-top: 1px solid #1a1a2a;
    font-size: 10px; color: #444;
    display: flex; gap: 20px;
  }
  .status-bar .ok { color: #51cf66; }
  .status-bar .err { color: #ff6b6b; }
  .status-bar .val { color: #9775fa; }

  /* JSON preview */
  .json-preview {
    background: #0a0a0f; border: 1px solid #1a1a2a; border-radius: 4px;
    padding: 12px; font-size: 10px; line-height: 1.5;
    color: #51cf66; overflow: auto; max-height: 300px;
    white-space: pre-wrap; word-break: break-all;
  }

  /* Drop zone */
  .drop-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,15,0.9);
    align-items: center; justify-content: center;
    font-size: 16px; color: #ffa94d; letter-spacing: 3px;
  }
  .drop-overlay.active { display: flex; }
</style>
</head>
<body>

<header>
  <div>
    <h1>7UP STUDIO</h1>
  </div>
  <div class="header-actions">
    <button class="btn-secondary" id="btn-import">IMPORT .7up</button>
    <button class="btn-primary" id="btn-export">EXPORT .7up</button>
    <button class="btn-secondary" id="btn-play">PLAY</button>
  </div>
</header>

<main>
  <div class="sidebar">
    <!-- Level meta -->
    <div class="section">
      <div class="section-head">Level</div>
      <div class="section-body">
        <div class="field">
          <label>Name</label>
          <input type="text" id="level-name" value="Untitled Level" />
        </div>
        <div class="field">
          <label>Author</label>
          <input type="text" id="level-author" value="" />
        </div>
        <div class="row">
          <div class="field">
            <label>Seed</label>
            <input type="number" id="level-seed" value="42" min="0" />
          </div>
          <div class="field" style="flex:0;align-self:end;">
            <button class="btn-secondary btn-small" id="btn-random-seed">DICE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SDXL settings -->
    <div class="section">
      <div class="section-head">SDXL Config</div>
      <div class="section-body">
        <div class="row">
          <div class="field">
            <label>Steps <span class="val" id="sdxl-steps-val">2</span></label>
            <input type="range" id="sdxl-steps" min="1" max="4" value="2" />
          </div>
          <div class="field">
            <label>CFG <span class="val" id="sdxl-cfg-val">1.0</span></label>
            <input type="range" id="sdxl-cfg" min="0" max="5" step="0.5" value="1" />
          </div>
        </div>
        <div class="field">
          <label>Scheduler</label>
          <select id="sdxl-scheduler">
            <option value="eulerAncestral" selected>Euler Ancestral</option>
            <option value="dpmSolverMultistep">DPM++ Multistep</option>
            <option value="pndm">PNDM</option>
          </select>
        </div>
        <div class="field">
          <label>Server</label>
          <input type="text" id="server-url" value="http://localhost:8090" />
        </div>
      </div>
    </div>

    <!-- Terrain -->
    <div class="section">
      <div class="section-head">Terrain</div>
      <div class="section-body">
        <div class="row">
          <div class="field">
            <label>Seed Period</label>
            <input type="number" id="terrain-period" value="2000" />
          </div>
          <div class="field">
            <label>Base Speed</label>
            <input type="number" id="terrain-speed" value="1.2" step="0.1" />
          </div>
        </div>
      </div>
    </div>

    <!-- Entities -->
    <div class="section">
      <div class="section-head">Entities</div>
      <div class="section-body">
        <div class="field">
          <label>Sprite Prompt</label>
          <textarea id="entity-prompt">pixel art enemy starfighter sprites, various alien spaceships facing left, side view, sci-fi fighters, glowing engines, detailed, solid black background, spaced apart</textarea>
        </div>
        <div class="row">
          <div class="field">
            <label>Density</label>
            <input type="number" id="entity-density" value="80" />
          </div>
          <div class="field">
            <label>Range</label>
            <input type="number" id="entity-range" value="20000" />
          </div>
        </div>
        <button class="btn-secondary btn-small" id="btn-gen-entities">GENERATE PREVIEW</button>
      </div>
    </div>

    <!-- Structures -->
    <div class="section">
      <div class="section-head">Structures</div>
      <div class="section-body">
        <div class="field">
          <label>Sprite Prompt</label>
          <textarea id="structure-prompt">6 individual pixel art sci-fi towers, each separated by empty black space, futuristic buildings, neon windows, cyberpunk, isolated objects on pure black background, spaced far apart, detailed, glowing</textarea>
        </div>
        <button class="btn-secondary btn-small" id="btn-gen-structures">GENERATE PREVIEW</button>
      </div>
    </div>

    <!-- JSON -->
    <div class="section">
      <div class="section-head">File Preview</div>
      <div class="section-body">
        <div class="json-preview" id="json-preview">{}</div>
      </div>
    </div>
  </div>

  <div class="preview-area">
    <h3 style="font-size:11px;color:#555;letter-spacing:2px;">LAYER TEXTURES</h3>
    <div class="preview-grid" id="layer-grid"></div>

    <h3 style="font-size:11px;color:#555;letter-spacing:2px;margin-top:8px;">ENTITY SPRITES</h3>
    <div class="sprite-row" id="entity-sprites"></div>

    <h3 style="font-size:11px;color:#555;letter-spacing:2px;margin-top:8px;">STRUCTURE SPRITES</h3>
    <div class="sprite-row" id="structure-sprites"></div>
  </div>
</main>

<div class="status-bar">
  <span>SERVER <span id="st-server" class="val">--</span></span>
  <span>LAYERS <span id="st-layers" class="val">0/7</span></span>
  <span>ENTITIES <span id="st-entities" class="val">--</span></span>
  <span>STRUCTURES <span id="st-structures" class="val">--</span></span>
</div>

<div class="drop-overlay" id="drop-overlay">DROP .7up FILE</div>

<input type="file" id="file-input" accept=".7up,.json" style="display:none" />

<script>
// ============================================================
//  7UP Studio — Level Editor
// ============================================================

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ── Default layer prompts ────────────────────
const DEFAULT_LAYER_PROMPTS = [
  'seamless tileable starfield texture, deep space, thousands of tiny stars, colorful nebula wisps, dark black background, astronomy photo, repeating pattern',
  'seamless tileable space nebula texture, cosmic gas clouds, purple blue pink wisps, transparent on dark, repeating pattern',
  'seamless tileable rocky cliff texture, dark stone, layered sediment, purple tint, side view, game terrain fill, repeating',
  'seamless tileable alien rock wall texture, crystalline formations, bioluminescent veins, dark stone, game terrain, repeating pattern',
  'seamless tileable sci-fi metal panel texture, alien architecture surface, glowing seams, dark, game texture, repeating',
  'seamless tileable mossy rock texture, alien vegetation, glowing fungus spots, detailed surface, game terrain fill, repeating',
  'seamless tileable dark ground texture, alien soil with small crystals, close up surface detail, game foreground, repeating',
];

const LAYER_NAMES = [
  'Deep Space', 'Nebula', 'Far Terrain', 'Mid Terrain',
  'Structures', 'Near Terrain', 'Foreground'
];

let layerPrompts = [...DEFAULT_LAYER_PROMPTS];
let serverOk = false;

// ── .7up File Format ─────────────────────────

function buildLevelFile() {
  return {
    version: '0.4',
    name: $('#level-name').value,
    author: $('#level-author').value,
    seed: parseInt($('#level-seed').value) || 42,
    sdxl: {
      steps: parseInt($('#sdxl-steps').value),
      cfg: parseFloat($('#sdxl-cfg').value),
      scheduler: $('#sdxl-scheduler').value,
    },
    layers: layerPrompts.map((prompt, i) => ({
      name: LAYER_NAMES[i],
      prompt,
      seed_offset: i * 1337,
    })),
    entities: {
      prompt: $('#entity-prompt').value,
      seed_offset: 777,
      density: parseInt($('#entity-density').value),
      spawn_range: parseInt($('#entity-range').value),
    },
    structures: {
      prompt: $('#structure-prompt').value,
      seed_offset: 555,
    },
    terrain: {
      seed_period: parseInt($('#terrain-period').value),
      base_speed: parseFloat($('#terrain-speed').value),
    },
  };
}

function loadLevelFile(data) {
  $('#level-name').value = data.name || 'Untitled';
  $('#level-author').value = data.author || '';
  $('#level-seed').value = data.seed || 42;
  if (data.sdxl) {
    $('#sdxl-steps').value = data.sdxl.steps || 2;
    $('#sdxl-steps-val').textContent = data.sdxl.steps || 2;
    $('#sdxl-cfg').value = data.sdxl.cfg || 1;
    $('#sdxl-cfg-val').textContent = (data.sdxl.cfg || 1).toFixed(1);
    $('#sdxl-scheduler').value = data.sdxl.scheduler || 'eulerAncestral';
  }
  if (data.layers) {
    layerPrompts = data.layers.map(l => l.prompt);
    buildLayerGrid();
  }
  if (data.entities) {
    $('#entity-prompt').value = data.entities.prompt || '';
    $('#entity-density').value = data.entities.density || 80;
    $('#entity-range').value = data.entities.spawn_range || 20000;
  }
  if (data.structures) {
    $('#structure-prompt').value = data.structures.prompt || '';
  }
  if (data.terrain) {
    $('#terrain-period').value = data.terrain.seed_period || 2000;
    $('#terrain-speed').value = data.terrain.base_speed || 1.2;
  }
  updateJSON();
}

// ── Layer Grid ───────────────────────────────

function buildLayerGrid() {
  const grid = $('#layer-grid');
  grid.innerHTML = '';
  layerPrompts.forEach((prompt, i) => {
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.dataset.layer = i;
    card.innerHTML = `
      <div class="thumb" id="layer-thumb-${i}">
        <div class="placeholder">Click to generate</div>
      </div>
      <div class="info">
        <span class="name">L${i} ${LAYER_NAMES[i]}</span>
        <span class="val" id="layer-status-${i}">--</span>
      </div>
    `;
    card.addEventListener('click', () => generateLayerPreview(i));
    grid.appendChild(card);

    // Make prompt editable on double-click
    card.addEventListener('dblclick', () => {
      const newPrompt = prompt(`Layer ${i} (${LAYER_NAMES[i]}) prompt:`, layerPrompts[i]);
      if (newPrompt !== null) {
        layerPrompts[i] = newPrompt;
        updateJSON();
      }
    });
  });
}

async function generateLayerPreview(layerIdx) {
  if (!serverOk) return;
  const thumb = $(`#layer-thumb-${layerIdx}`);
  const status = $(`#layer-status-${layerIdx}`);
  thumb.innerHTML = '<div class="spinner"></div>';
  status.textContent = '...';

  const seed = (parseInt($('#level-seed').value) || 42) * 7 + layerIdx * 1337;
  try {
    const t0 = performance.now();
    const r = await fetch(`${$('#server-url').value}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: layerPrompts[layerIdx], seed,
        width: 512, height: 512,
        steps: parseInt($('#sdxl-steps').value),
        guidance_scale: parseFloat($('#sdxl-cfg').value),
        scheduler: $('#sdxl-scheduler').value,
      }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    thumb.innerHTML = `<img src="${url}" />`;
    status.textContent = `${elapsed}s`;
    updateLayerCount();
  } catch (e) {
    thumb.innerHTML = `<div class="placeholder" style="color:#ff6b6b">${e.message}</div>`;
    status.textContent = 'ERR';
  }
}

function generateAllLayers() {
  for (let i = 0; i < layerPrompts.length; i++) {
    // Stagger slightly so server doesn't get hammered
    setTimeout(() => generateLayerPreview(i), i * 500);
  }
}

function updateLayerCount() {
  const loaded = $$('.preview-card .thumb img').length;
  $('#st-layers').textContent = `${loaded}/7`;
}

// ── Sprite Generation ────────────────────────

async function generateSpritePreview(prompt, seed, container, statusEl) {
  if (!serverOk) return;
  container.innerHTML = '<div class="spinner" style="margin:16px"></div>';
  statusEl.textContent = '...';

  try {
    const t0 = performance.now();
    const r = await fetch(`${$('#server-url').value}/generate-sprites`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt, seed,
        steps: parseInt($('#sdxl-steps').value),
        guidance_scale: parseFloat($('#sdxl-cfg').value),
        scheduler: $('#sdxl-scheduler').value,
      }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

    container.innerHTML = '';
    let validCount = 0;
    for (const s of data.sprites) {
      if (s.width < 20 || s.height < 20) continue;
      if (s.width > 400 && s.height > 400) continue;
      const bytes = Uint8Array.from(atob(s.png), c => c.charCodeAt(0));
      const blob = new Blob([bytes], { type: 'image/png' });
      const img = document.createElement('img');
      img.src = URL.createObjectURL(blob);
      img.title = `${s.width}x${s.height}`;
      container.appendChild(img);
      validCount++;
    }
    statusEl.textContent = `${validCount} sprites (${elapsed}s)`;
  } catch (e) {
    container.innerHTML = `<span style="color:#ff6b6b;font-size:10px">${e.message}</span>`;
    statusEl.textContent = 'ERR';
  }
}

// ── Server Check ─────────────────────────────

async function checkServer() {
  try {
    const r = await fetch(`${$('#server-url').value}/health`, { signal: AbortSignal.timeout(2000) });
    if (r.ok) {
      serverOk = true;
      $('#st-server').textContent = 'CONNECTED';
      $('#st-server').className = 'ok';
      return;
    }
  } catch {}
  serverOk = false;
  $('#st-server').textContent = 'OFFLINE';
  $('#st-server').className = 'err';
}

// ── JSON Preview ─────────────────────────────

function updateJSON() {
  const data = buildLevelFile();
  $('#json-preview').textContent = JSON.stringify(data, null, 2);
}

// ── Export / Import ──────────────────────────

function exportLevel() {
  const data = buildLevelFile();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safeName = (data.name || 'level').replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
  a.download = `${safeName}-seed${data.seed}.7up`;
  a.click();
}

function importLevel(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      loadLevelFile(data);
      // Auto-generate previews
      if (serverOk) generateAllLayers();
    } catch (e) {
      alert(`Invalid .7up file: ${e.message}`);
    }
  };
  reader.readAsText(file);
}

// ── Play Button ──────────────────────────────

function playLevel() {
  const data = buildLevelFile();
  // Encode as URL fragment for the engine
  const encoded = encodeURIComponent(JSON.stringify(data));
  window.open(`../7up-demo-2.html#level=${encoded}`, '_blank');
}

// ── Event Wiring ─────────────────────────────

// Slider labels
$('#sdxl-steps').addEventListener('input', e => {
  $('#sdxl-steps-val').textContent = e.target.value;
  updateJSON();
});
$('#sdxl-cfg').addEventListener('input', e => {
  $('#sdxl-cfg-val').textContent = parseFloat(e.target.value).toFixed(1);
  updateJSON();
});

// All inputs update JSON preview
for (const el of $$('input, textarea, select')) {
  el.addEventListener('change', updateJSON);
}

$('#btn-random-seed').addEventListener('click', () => {
  $('#level-seed').value = Math.floor(Math.random() * 2147483647);
  updateJSON();
});

$('#btn-export').addEventListener('click', exportLevel);
$('#btn-play').addEventListener('click', playLevel);
$('#btn-import').addEventListener('click', () => $('#file-input').click());
$('#file-input').addEventListener('change', e => {
  if (e.target.files[0]) importLevel(e.target.files[0]);
});

$('#btn-gen-entities').addEventListener('click', () => {
  const seed = (parseInt($('#level-seed').value) || 42) * 777;
  generateSpritePreview($('#entity-prompt').value, seed, $('#entity-sprites'), $('#st-entities'));
});

$('#btn-gen-structures').addEventListener('click', () => {
  const seed = (parseInt($('#level-seed').value) || 42) * 555;
  generateSpritePreview($('#structure-prompt').value, seed, $('#structure-sprites'), $('#st-structures'));
});

// Section collapse toggle
for (const head of $$('.section-head')) {
  head.addEventListener('click', () => {
    head.parentElement.classList.toggle('collapsed');
  });
}

// Drag-and-drop .7up files
document.addEventListener('dragover', e => { e.preventDefault(); $('#drop-overlay').classList.add('active'); });
document.addEventListener('dragleave', e => {
  if (e.relatedTarget === null) $('#drop-overlay').classList.remove('active');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  $('#drop-overlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.7up') || file.name.endsWith('.json'))) {
    importLevel(file);
  }
});

// Keyboard: Cmd+S export, Cmd+G generate all, Cmd+P play
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportLevel(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'g') { e.preventDefault(); generateAllLayers(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); playLevel(); }
});

// ── Boot ─────────────────────────────────────
buildLayerGrid();
updateJSON();
checkServer().then(() => {
  if (serverOk) generateAllLayers();
});
$('#server-url').addEventListener('change', checkServer);
</script>
</body>
</html>
